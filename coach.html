    <style>
        /* ── Full-height chat layout ────────────────────────────────────────────── */

        html, body.page-coach {
            height: 100%;
            overflow: hidden;
        }

        body.page-coach {
            padding-top: 0; /* header offset handled by coach-app */
            display: flex;
            flex-direction: column;
        }

        /* App shell sits below the 58px fixed site header */
        .coach-app {
            position: fixed;
            top: 58px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            max-width: 760px;
            margin: 0 auto;
        }

        /* Scrollable chat area */
        .coach-chat {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            /* Hide scrollbar — scroll still works */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .coach-chat::-webkit-scrollbar {
            display: none;
        }

        /* Prompt dock — anchored at bottom, no keyline */
        .coach-dock {
            flex-shrink: 0;
            padding: 0 0.5rem 1.5rem;
            background: var(--cream);
            position: relative;
        }

        /* ── Fade-in for refreshed content ─────────────────────────────────────── */

        @keyframes coachFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .coach-fade-in {
            animation: coachFadeIn 0.35s ease;
        }


        /* ── Page intro (scrolls with chat) ────────────────────────────────────── */

        .coach-intro {
            padding-bottom: 0;
        }

        /* ── Scenario section heading (matches .article-content h3) ────────────── */

        .scenario-section-h2 {
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 0.65rem;
            color: var(--green-dark);
            letter-spacing: 0.01em;
        }

        /* ── Coach message ──────────────────────────────────────────────────────── */

        .msg-coach {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 100%;
        }

        .scenario-head {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 1.5rem;
            color: var(--ink);
            font-weight: 400;
            letter-spacing: 0.01em;
            margin-top: 1.75rem;
            margin-bottom: 0;
        }

        .scenario-body {
            font-family: 'Lora', Georgia, serif;
            font-size: 1rem;
            line-height: 1.75;
            color: var(--ink);
        }

        /* ── User message ───────────────────────────────────────────────────────── */

        .msg-user {
            display: flex;
            justify-content: flex-end;
        }

        .msg-user-bubble {
            background: var(--cream-dark);
            border: 1px solid var(--ink-light);
            border-radius: 16px 16px 4px 16px;
            padding: 20px 24px;
            max-width: 82%;
            font-family: 'Lora', Georgia, serif;
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--ink);
            word-break: break-word;
            position: relative;
            max-height: 260px;
            overflow: hidden;
        }

        .msg-user-bubble p { margin: 0; }
        .msg-user-bubble p + p { margin-top: 0.5em; }

        .msg-user-bubble ul,
        .msg-user-bubble ol {
            margin: 0.35em 0;
            padding-left: 1.4em;
        }

        .msg-user-bubble li { margin-bottom: 0.15em; }
        .msg-user-bubble li:last-child { margin-bottom: 0; }

        /* Sub-lists rendered as separate sequential elements with extra indent */
        .msg-user-bubble ol[type="a"],
        .msg-user-bubble ul.user-sub-ul {
            padding-left: 2.8em;
            margin-top: 0;
        }

        .msg-user-bubble ul.user-sub-ul {
            list-style-type: circle;
        }

        /* Collapsed state: extra bottom padding for button + fade overlay */
        .msg-user-bubble.has-overflow {
            padding-bottom: 56px;
        }

        .msg-user-bubble.has-overflow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, transparent 0%, var(--cream-dark) 65%);
            pointer-events: none;
            border-radius: 0 0 4px 16px;
        }

        /* Expanded state */
        .msg-user-bubble.is-expanded {
            max-height: none;
            padding-bottom: 56px;
        }

        /* Show more / Show less button — sits inside the bubble */
        .show-more-btn {
            position: absolute;
            bottom: 14px;
            left: 24px;
            background: none;
            border: none;
            color: var(--ink-medium);
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0;
            z-index: 1;
            transform: none !important;
            transition: color 0.15s ease;
        }

        .show-more-btn:hover {
            color: var(--ink);
        }

        /* ── Loading indicator ──────────────────────────────────────────────────── */

        .coach-loading {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.875rem;
            color: var(--ink-medium);
        }

        .coach-pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
            animation: coachPulse 1.4s ease-in-out infinite;
        }

        @keyframes coachPulse {
            0%, 100% { opacity: 0.25; transform: scale(0.75); }
            50%       { opacity: 1;    transform: scale(1); }
        }

        /* ── Session end ────────────────────────────────────────────────────────── */

        .session-end-row {
            display: flex;
            justify-content: flex-end;
            padding-bottom: 2rem;
        }

        /* ── Back-to-bottom button (floats above dock) ──────────────────────────── */

        .scroll-bottom-wrapper {
            position: absolute;
            top: -48px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .scroll-bottom-wrapper.hidden {
            display: none;
        }

        .scroll-bottom-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--surface);
            color: var(--ink-medium);
            border: 1px solid var(--ink-light);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.15s ease;
            transform: none !important;
            pointer-events: auto;
            box-shadow: 0 4px 8px -2px rgba(51, 40, 32, 0.22);
        }

        .scroll-bottom-btn:hover {
            background: var(--cream);
            transform: none !important;
        }

        /* ── Scenario nav row (prev / next below prompt) ────────────────────────── */

        .scenario-change-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }

        .scenario-change-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--ink-medium);
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.15s ease, gap 0.15s ease;
            transform: none !important;
        }

        #prev-scenario-btn::before { content: '←'; }
        #next-scenario-btn::after  { content: '→'; }

        .scenario-change-btn:hover:not(:disabled) {
            color: var(--green);
            gap: 10px;
            transform: none !important;
        }

        .scenario-change-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Prompt box (Claude-style) ──────────────────────────────────────────── */

        .prompt-box {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--ink-light);
            border-radius: 16px;
            transition: border-color 0.15s ease;
        }

        .prompt-box:focus-within {
            border-color: rgba(107, 95, 84, 0.55);
        }

        /* Override styles.css textarea for the coach prompt only */
        .prompt-box textarea {
            display: block;
            width: 100%;
            min-height: 160px;
            max-height: 280px;
            padding: 13px 52px 13px 16px;
            font-family: 'Lora', Georgia, serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--ink);
            background: transparent;
            border: none;
            border-radius: 16px;
            resize: none;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            /* reset styles.css overrides */
            min-height: 160px;
            box-shadow: none;
        }

        .prompt-box textarea::-webkit-scrollbar {
            display: none;
        }

        .prompt-box textarea:focus {
            outline: none;
            border-color: transparent;
            background: transparent;
            box-shadow: none;
        }

        .prompt-box textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Circle submit button */
        .prompt-submit {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--ink-light); /* inactive: warm grey */
            border: none;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s ease;
        }

        .prompt-submit.is-active {
            background: var(--green);
            cursor: pointer;
        }

        .prompt-submit.is-active:hover {
            background: var(--green-dark);
        }

        .prompt-submit:disabled {
            background: var(--ink-light);
            cursor: not-allowed;
        }

        /* Error text */
        .coach-error {
            color: var(--accent);
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.875rem;
            padding: 4px 0;
        }
    </style>
</head>
<body class="page-coach">

    <div class="coach-app">
        <div class="coach-chat" id="chat-area"></div>

        <div class="coach-dock" id="input-dock">
            <div class="scroll-bottom-wrapper hidden" id="scroll-bottom-wrapper">
                <button class="scroll-bottom-btn" onclick="scrollToBottom()" title="Back to bottom">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 2v8M6 10L3 7M6 10L9 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="prompt-box">
                <textarea id="answer-textarea" placeholder="Type your answer here…"></textarea>
                <button class="prompt-submit" id="submit-btn" onclick="handleSubmit()" title="Submit" disabled>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 11V3M7 3L3.5 6.5M7 3L10.5 6.5" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="scenario-change-row">
                <button class="scenario-change-btn" id="prev-scenario-btn" onclick="navigateScenario(-1)">Previous scenario</button>
                <button class="scenario-change-btn" id="next-scenario-btn" onclick="navigateScenario(1)">Next scenario</button>

    <script src="/nav.js"></script>
    <script>
        const API_BASE = 'https://product-sense-coach-production.up.railway.app';

        /* ── State ── */
        let allScenarios = [];
        let currentScenarioIndex = -1;
        let currentScenario = null;
        let messages = [];
        let phase = 0;
        let consecutiveEmptyListEnters = 0;

        /* ── Elements ── */
        const textarea            = document.getElementById('answer-textarea');
        const submitBtn           = document.getElementById('submit-btn');
        const inputDock           = document.getElementById('input-dock');
        const chatArea            = document.getElementById('chat-area');
        const scrollBottomWrapper = document.getElementById('scroll-bottom-wrapper');
        const prevScenarioBtn     = document.getElementById('prev-scenario-btn');
        const nextScenarioBtn     = document.getElementById('next-scenario-btn');

        function setNavBusy(busy) {
            prevScenarioBtn.disabled = busy;
            nextScenarioBtn.disabled = busy;
        }

        /* ── Boot — fetch full list, start on a random scenario ── */
        (async function boot() {
            setNavBusy(true);
            try {
                var res = await fetch(API_BASE + '/api/scenarios');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allScenarios = await res.json();
                currentScenarioIndex = Math.floor(Math.random() * allScenarios.length);
                await loadScenario();
            } catch (err) {
                var errEl = document.createElement('div');
                errEl.className = 'msg-coach';
                errEl.innerHTML = '<div class="coach-error">Could not connect to server.</div>';
                chatArea.appendChild(errEl);
                setNavBusy(false);
            }
        })();
        wireAutoResize(textarea);

        /* Button activates only when textarea has content */
        textarea.addEventListener('input', function () {
            const hasText = textarea.value.trim().length > 0;
            submitBtn.disabled = !hasText;
            submitBtn.classList.toggle('is-active', hasText);
        });

        /* Auto-replace "- " with "   • " (indented bullet) when typed at line start.
           Also resets the exit-counter whenever the user types real content. */
        textarea.addEventListener('input', function () {
            var pos       = textarea.selectionStart;
            var val       = textarea.value;
            var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
            var linePrefix = val.substring(lineStart, pos);

            if (linePrefix === '- ') {
                textarea.value = val.substring(0, lineStart) + '   • ' + val.substring(pos);
                textarea.selectionStart = textarea.selectionEnd = lineStart + 5;
                return;
            }

            /* Auto-indent "N. " typed at the start of a line → "   N. " */
            var orderedTyped = /^(\d+)\. $/.exec(linePrefix);
            if (orderedTyped) {
                var indented = '   ' + orderedTyped[1] + '. ';
                textarea.value = val.substring(0, lineStart) + indented + val.substring(pos);
                textarea.selectionStart = textarea.selectionEnd = lineStart + indented.length;
                return;
            }

            /* Reset exit-counter if user is typing real content on a list line */
            var hasContent = /^   (?:\d+\. |• )(.+)/.test(linePrefix) ||
                             /^      (?:[a-z]\. |◦ )(.+)/.test(linePrefix);
            if (hasContent) consecutiveEmptyListEnters = 0;
        });

        /* ── Keyboard handler ── */
        textarea.addEventListener('keydown', function (e) {

            /* TAB — indent list item into sub-list */
            if (e.key === 'Tab') {
                e.preventDefault();
                var pos       = textarea.selectionStart;
                var val       = textarea.value;
                var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                var lineEnd   = val.indexOf('\n', pos); if (lineEnd === -1) lineEnd = val.length;
                var fullLine  = val.substring(lineStart, lineEnd);

                var mo = /^   (\d+)\. (.*)/.exec(fullLine);
                var mu = /^   • (.*)/.exec(fullLine);

                if (mo || mu) {
                    var content   = mo ? mo[2] : mu[1];
                    var newPrefix = mo ? '      a. ' : '      ◦ ';
                    var newLine   = newPrefix + content;
                    textarea.value = val.substring(0, lineStart) + newLine + val.substring(lineEnd);
                    textarea.selectionStart = textarea.selectionEnd = lineStart + newPrefix.length + content.length;
                    consecutiveEmptyListEnters = 0;
                    autoResize(textarea);
                    textarea.dispatchEvent(new Event('input'));
                }
                /* Not on a list line: swallow Tab (avoids focus jump) */
                return;
            }

            /* BACKSPACE — smart list prefix handling */
            if (e.key === 'Backspace') {
                var pos       = textarea.selectionStart;
                var val       = textarea.value;
                var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                var lineEnd   = val.indexOf('\n', pos); if (lineEnd === -1) lineEnd = val.length;
                var fullLine  = val.substring(lineStart, lineEnd);

                /* ── Sub-list empty item: return to parent list ── */
                var soFull = /^      [a-z]\. (.*)/.exec(fullLine);
                var suFull = /^      ◦ (.*)/.exec(fullLine);
                var subIsEmpty = (soFull && soFull[1].trim() === '') ||
                                 (suFull && suFull[1].trim() === '');

                if (subIsEmpty && pos > lineStart) {
                    e.preventDefault();
                    var newPrefix;
                    if (soFull) {
                        /* Find last main ordered number — start at length-2 to skip
                           the trailing '' that split('\n') always produces */
                        var before = val.substring(0, lineStart);
                        var beforeLines = before.split('\n');
                        var lastNum = 0;
                        for (var j = beforeLines.length - 2; j >= 0; j--) {
                            var nm = /^   (\d+)\. /.exec(beforeLines[j]);
                            if (nm) { lastNum = parseInt(nm[1], 10); break; }
                            if (beforeLines[j].trim() === '') break;
                        }
                        newPrefix = '   ' + (lastNum > 0 ? lastNum + 1 : 1) + '. ';
                    } else {
                        newPrefix = '   • ';
                    }
                    textarea.value = val.substring(0, lineStart) + newPrefix + val.substring(lineEnd);
                    textarea.selectionStart = textarea.selectionEnd = lineStart + newPrefix.length;
                    consecutiveEmptyListEnters = 0;
                    autoResize(textarea);
                    textarea.dispatchEvent(new Event('input'));
                    return;
                }

                /* ── Main list empty item: clear entire prefix in one tap ── */
                var moFull = /^   (\d+)\. (.*)/.exec(fullLine);
                var muFull = /^   • (.*)/.exec(fullLine);
                var mainIsEmpty = (moFull && moFull[2].trim() === '') ||
                                  (muFull && muFull[1].trim() === '');

                if (mainIsEmpty && pos > lineStart) {
                    e.preventDefault();
                    /* Remove the prefix, leaving an empty line */
                    textarea.value = val.substring(0, lineStart) + val.substring(lineEnd);
                    textarea.selectionStart = textarea.selectionEnd = lineStart;
                    consecutiveEmptyListEnters = 0;
                    autoResize(textarea);
                    textarea.dispatchEvent(new Event('input'));
                    return;
                }

                /* else: normal backspace — fall through */
            }

            /* ENTER (no shift) — submit */
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!submitBtn.disabled) handleSubmit();
                return;
            }

            /* SHIFT+ENTER — newline, with list continuation logic */
            if (e.key === 'Enter' && e.shiftKey) {
                var pos       = textarea.selectionStart;
                var val       = textarea.value;
                var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                var cur       = val.substring(lineStart, pos);

                var mo = /^   (\d+)\. (.*)/.exec(cur);
                var mu = /^   • (.*)/.exec(cur);
                var so = /^      ([a-z])\. (.*)/.exec(cur);
                var su = /^      ◦ (.*)/.exec(cur);

                if (mo || mu || so || su) {
                    e.preventDefault();
                    var content = mo ? mo[2] : mu ? mu[1] : so ? so[2] : su[1];
                    var isEmpty = content.trim() === '';

                    if (isEmpty) {
                        consecutiveEmptyListEnters++;
                        if (consecutiveEmptyListEnters >= 2) {
                            /* Exit list — strip the empty item prefix, leave a blank line */
                            consecutiveEmptyListEnters = 0;
                            textarea.value = val.substring(0, lineStart) + '\n' + val.substring(pos);
                            textarea.selectionStart = textarea.selectionEnd = lineStart + 1;
                        } else {
                            /* First empty press — add another empty item */
                            var ins = '\n' + nextListPrefix(mo, mu, so, su);
                            textarea.value = val.substring(0, pos) + ins + val.substring(pos);
                            textarea.selectionStart = textarea.selectionEnd = pos + ins.length;
                        }
                    } else {
                        /* Non-empty item: create next item and pre-load counter so
                           the very next Shift+Enter on the new empty item exits */
                        consecutiveEmptyListEnters = 1;
                        var ins = '\n' + nextListPrefix(mo, mu, so, su);
                        textarea.value = val.substring(0, pos) + ins + val.substring(pos);
                        textarea.selectionStart = textarea.selectionEnd = pos + ins.length;
                    }
                    autoResize(textarea);
                    textarea.dispatchEvent(new Event('input'));
                }
                /* else: plain Shift+Enter newline — let browser handle */
            }
        });

        function nextListPrefix(mo, mu, so, su) {
            if (mo) return '   ' + (parseInt(mo[1], 10) + 1) + '. ';
            if (mu) return '   • ';
            if (so) return '      ' + String.fromCharCode(so[1].charCodeAt(0) + 1) + '. ';
            return '      ◦ ';
        }

        /* Back-to-bottom: show when not at bottom */
        chatArea.addEventListener('scroll', function () {
            var atBottom = chatArea.scrollTop + chatArea.clientHeight >= chatArea.scrollHeight - 20;
            scrollBottomWrapper.classList.toggle('hidden', atBottom);
        });

        /* ── Auto-resize ── */
        function wireAutoResize(el) {
            el.addEventListener('input', function () { autoResize(el); });
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        /* ── Submit gate ── */
        function handleSubmit() {
            const text = textarea.value.trim();
            if (!text) return;

            if (phase === 0) {
                addUserBubble(text);
                messages.push({
                    role: 'user',
                    content: 'SCENARIO:\n' + currentScenario.scenario + '\n\nCANDIDATE ANSWER:\n' + text,
                });
                clearInput();
                setInputBusy(true);
                phase = 1;
                streamAndRender(1);
            } else if (phase === 2) {
                addUserBubble(text);
                messages.push({ role: 'user', content: text });
                clearInput();
                setInputBusy(true);
                phase = 3;
                streamAndRender(3);
            } else if (phase === 4) {
                addUserBubble(text);
                messages.push({ role: 'user', content: text });
                clearInput();
                setInputBusy(true);
                phase = 5;
                streamAndRender(5);
            }
        }

        /* ── Navigate to prev / next scenario (wraps around) ── */
        function navigateScenario(dir) {
            if (!allScenarios.length) return;
            currentScenarioIndex = (currentScenarioIndex + dir + allScenarios.length) % allScenarios.length;
            loadScenario();
        }

        /* ── Load the scenario at currentScenarioIndex ── */
        async function loadScenario() {
            setNavBusy(true);

            /* Remove all chat content except the intro, which stays in place */
            Array.from(chatArea.children).forEach(function (child) {
                if (!child.classList.contains('coach-intro')) child.remove();
            });

            var data = allScenarios[currentScenarioIndex];
            currentScenario = data;

            phase = 0;
            messages = [];
            clearInput();
            setInputBusy(false);
            inputDock.style.display = '';

            /* Create intro only on first load */
            if (!chatArea.querySelector('.coach-intro')) {
                var introEl = document.createElement('div');
                introEl.className = 'coach-intro';
                introEl.innerHTML =
                    '<h1>Product Sense Coach</h1>' +
                    '<p class="coach-intro-text">Use this coach to refine your ability to breakdown complex project scenarios. State your assumptions, be clear and methodical, show your craft skills. Good luck!</p>' +
                    '<div class="scenario-head">The scenario</div>';
                chatArea.appendChild(introEl);
            }

            /* Scenario card — fades in on each load */
            var msgEl = document.createElement('div');
            msgEl.className = 'msg-coach coach-fade-in';
            msgEl.innerHTML =
                '<div class="scenario-section-h2">' + escapeHtml(data.title) + '</div>' +
                '<div class="scenario-body">' + escapeHtml(data.scenario) + '</div>';
            chatArea.appendChild(msgEl);

            setNavBusy(false);
            scrollToBottom();
        }

        /* ── Chat helpers ── */
        function addUserBubble(text) {
            var el = document.createElement('div');
            el.className = 'msg-user';
            var bubble = document.createElement('div');
            bubble.className = 'msg-user-bubble';
            bubble.innerHTML = formatUserText(text);
            el.appendChild(bubble);
            chatArea.appendChild(el);
            scrollToBottom();

            /* Add show-more/less toggle inside bubble if content overflows */
            requestAnimationFrame(function () {
                if (bubble.scrollHeight > bubble.clientHeight + 2) {
                    bubble.classList.add('has-overflow');
                    var btn = document.createElement('button');
                    btn.className = 'show-more-btn';
                    btn.textContent = 'Show more';
                    bubble.appendChild(btn);
                    btn.onclick = function () {
                        if (bubble.classList.contains('is-expanded')) {
                            bubble.classList.remove('is-expanded');
                            bubble.classList.add('has-overflow');
                            btn.textContent = 'Show more';
                        } else {
                            bubble.classList.remove('has-overflow');
                            bubble.classList.add('is-expanded');
                            btn.textContent = 'Show less';
                        }
                    };
                }
            });
        }

        function addLoadingIndicator() {
            var el = document.createElement('div');
            el.className = 'msg-coach';
            el.id = 'loading-msg';
            el.innerHTML =
                '<div class="coach-loading"><div class="coach-pulse-dot"></div><span>Thinking&hellip;</span></div>';
            chatArea.appendChild(el);
            el.scrollIntoView({ block: 'nearest' });
            return el;
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
            scrollBottomWrapper.classList.add('hidden');
        }

        function clearInput() {
            textarea.value = '';
            textarea.style.height = '160px';
            submitBtn.disabled = true;
            submitBtn.classList.remove('is-active');
        }

        function setInputBusy(busy) {
            textarea.disabled = busy;
            submitBtn.disabled = busy;
            if (busy) submitBtn.classList.remove('is-active');
        }

        /* ── Section HTML builders ── */

        function buildRubricHtml(fullText) {
            var scores = parseRubricScores(fullText);
            var items = [
                { label: 'Problem Framing',      score: scores.problemFraming },
                { label: 'User Empathy',         score: scores.userEmpathy },
                { label: 'Prioritisation Logic', score: scores.prioritisationLogic },
                { label: 'Measurability',        score: scores.measurability },
            ];
            var html = '<div class="coach-rubric-grid">';
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                html += '<div class="coach-rubric-card">' +
                    '<div class="coach-rubric-number">' + it.score + '</div>' +
                    '<div class="coach-rubric-denom">/10</div>' +
                    '<div class="coach-rubric-label">' + it.label + '</div>' +
                    '<div class="coach-score-bar-track">' +
                    '<div class="coach-score-bar-fill ' + scoreColor(it.score) + '" style="width:' + (it.score === 0 ? 2 : (it.score / 10) * 100) + '%"></div>' +
                    '</div></div>';
            }
            html += '</div>';
            html += '<div class="coach-overall-score">Overall: <strong>' + scores.overall + '/40</strong>' +
                (scores.grade ? ' &mdash; ' + escapeHtml(scores.grade) : '') + '</div>';
            return html;
        }

        function buildSummaryHtml(content) {
            var wm  = content.match(/What worked:([\s\S]*?)(?=Improve next time:|One thing to say|$)/i);
            var im  = content.match(/Improve next time:([\s\S]*?)(?=One thing to say|$)/i);
            var otm = content.match(/One thing to say next time:([\s\S]*?)$/i);
            var inner = '';
            if (wm)  inner += '<div class="coach-summary-section"><div class="coach-summary-label">What worked</div><ul>' + parseBullets(wm[1].trim()) + '</ul></div>';
            if (im)  inner += '<div class="coach-summary-section"><div class="coach-summary-label">Improve next time</div><ul>' + parseBullets(im[1].trim()) + '</ul></div>';
            if (otm) {
                var raw = otm[1].trim(), qm = raw.match(/"([^"]+)"/);
                inner += '<div class="coach-summary-section"><div class="coach-summary-label">One thing to say next time</div>' +
                    '<div class="coach-verbatim">' + (qm ? '&ldquo;' + formatInline(qm[1]) + '&rdquo;' : formatInline(raw)) + '</div></div>';
            }
            if (!inner) inner = '<div class="coach-feedback">' + formatFeedbackText(content) + '</div>';
            return '<div class="coach-summary-card"><h2>Coach&rsquo;s Summary</h2>' + inner + '</div>';
        }

        function sectionToEl(title, content, fullText) {
            var el = document.createElement('div');
            el.className = 'coach-fade-in';
            var t = title.toUpperCase();
            if (t.indexOf('RUBRIC') !== -1) {
                el.innerHTML = buildRubricHtml(fullText);
            } else if (t.indexOf('DETAILED FEEDBACK') !== -1 || t.indexOf('FEEDBACK') !== -1) {
                el.innerHTML = '<div class="coach-feedback">' + formatFeedbackText(content) + '</div>';
            } else if (t.indexOf('COACHING QUESTION') !== -1) {
                var isQ2 = t.indexOf('2') !== -1;
                el.innerHTML = '<div class="coach-question-callout"><div class="coach-question-label">Coaching Question' + (isQ2 ? ' 2' : '') + '</div><p>' + formatFeedbackText(content.trim()) + '</p></div>';
            } else if (t.indexOf('SUMMARY') !== -1) {
                el.innerHTML = buildSummaryHtml(content);
            } else {
                el.innerHTML = '<div class="coach-feedback">' + formatFeedbackText(content) + '</div>';
            }
            return el;
        }

        /* ── SSE streaming — buffer full response, then stagger-reveal sections ── */
        async function streamAndRender(currentPhase) {
            var loadingEl = addLoadingIndicator();

            try {
                var res = await fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages }),
                });
                if (!res.ok) {
                    var errBody;
                    try { errBody = await res.json(); } catch (e) { errBody = null; }
                    throw new Error(errBody && errBody.error ? errBody.error : 'HTTP ' + res.status);
                }

                /* Buffer the full SSE stream */
                var reader = res.body.getReader();
                var decoder = new TextDecoder();
                var sseBuffer = '';
                var fullText = '';
                var done = false;

                while (!done) {
                    var chunk = await reader.read();
                    if (chunk.done) break;
                    sseBuffer += decoder.decode(chunk.value, { stream: true });
                    var lines = sseBuffer.split('\n');
                    sseBuffer = lines.pop();

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (!line.startsWith('data: ')) continue;
                        var payload = line.slice(6);
                        if (payload === '[DONE]') { done = true; break; }
                        var parsed;
                        try { parsed = JSON.parse(payload); } catch (e) { continue; }
                        if (parsed.error) throw new Error(parsed.error);
                        if (parsed.text) fullText += parsed.text;
                    }
                }

                messages.push({ role: 'assistant', content: fullText });

                /* Parse once on the complete text */
                var sections = parseSections(fullText);
                var sectionKeys = Object.keys(sections);

                loadingEl.remove();
                var msgEl = document.createElement('div');
                msgEl.className = 'msg-coach';
                chatArea.appendChild(msgEl);

                /* Reveal sections with staggered fade-ins */
                var STEP = 280;
                for (var s = 0; s < sectionKeys.length; s++) {
                    (function (key, delay, idx) {
                        setTimeout(function () {
                            msgEl.appendChild(sectionToEl(key, sections[key], fullText));
                            /* On first section, scroll to the top of the response
                               so the user reads from the beginning, not the bottom */
                            if (idx === 0) msgEl.scrollIntoView({ block: 'start' });
                        }, delay);
                    })(sectionKeys[s], s * STEP, s);
                }

                /* Update phase after the last section has appeared */
                setTimeout(function () {
                    if (currentPhase === 1) {
                        phase = 2;
                        textarea.placeholder = 'Type your response\u2026';
                        setInputBusy(false);
                    } else if (currentPhase === 3) {
                        phase = 4;
                        textarea.placeholder = 'Type your response\u2026';
                        setInputBusy(false);
                    } else if (currentPhase === 5) {
                        phase = 6;
                        inputDock.style.display = 'none';
                        var endEl = document.createElement('div');
                        endEl.className = 'session-end-row';
                        endEl.innerHTML = '<button class="coach-btn-primary" onclick="navigateScenario(1)">Next Scenario &rarr;</button>';
                        chatArea.appendChild(endEl);
                    }
                }, sectionKeys.length * STEP);

            } catch (err) {
                loadingEl.remove();
                var errEl = document.createElement('div');
                errEl.className = 'msg-coach';
                errEl.innerHTML = '<div class="coach-error">Error: ' + escapeHtml(err.message) + '</div>';
                chatArea.appendChild(errEl);
                setInputBusy(false);
            }
        }

        /* ── Section parser (3-state — fixes the feedback display bug) ── */
        function parseSections(text) {
            var sections = {};
            var lines = text.split('\n');
            var currentTitle = null;
            var contentLines = [];
            var state = 'content'; /* 'content' | 'title' | 'post-title' */

            function isSep(l) { return /^═{4,}/.test(l.trim()); }

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (isSep(line)) {
                    if (state === 'content') {
                        if (currentTitle !== null) {
                            sections[currentTitle] = contentLines.join('\n').trim();
                        }
                        contentLines = [];
                        state = 'title';
                    } else if (state === 'post-title') {
                        state = 'content';
                    }
                } else {
                    if (state === 'title') {
                        currentTitle = line.trim();
                        state = 'post-title';
                    } else if (state === 'content' && currentTitle !== null) {
                        contentLines.push(line);
                    }
                }
            }
            if (currentTitle !== null && contentLines.length > 0) {
                sections[currentTitle] = contentLines.join('\n').trim();
            }
            return sections;
        }

        /* ── Rubric scores (flexible regex — handles format variations) ── */
        function parseRubricScores(text) {
            function g(rx) { var m = text.match(rx); return m ? parseInt(m[1], 10) : 0; }
            var overallScore = g(/Overall:\s*\[?(\d+)\/40\]?/i);
            var gradeMatch   = text.match(/Grade:\s*([^\]\n\r]+)/i);
            var grade        = gradeMatch ? gradeMatch[1].replace(/\]$/, '').replace(/\s*\([\d–\-]+\)$/, '').trim() : '';
            return {
                problemFraming:      g(/Problem\s+Framing\s*\[?(\d+)\/10\]?/i),
                userEmpathy:         g(/User\s+Empathy\s*\[?(\d+)\/10\]?/i),
                prioritisationLogic: g(/Prioritis[ae]tion\s+Logic\s*\[?(\d+)\/10\]?/i),
                measurability:       g(/Measurability\s*\[?(\d+)\/10\]?/i),
                overall: overallScore,
                grade:   grade,
            };
        }

        function scoreColor(n) {
            if (n >= 8) return 'is-green';
            if (n >= 5) return 'is-medium';
            return 'is-rust';
        }

        /* ── User text formatter ───────────────────────────────────────────────────
           New indented format (3-space main, 6-space sub); old formats kept for
           backward compatibility with messages typed before this update.
        ── */
        function formatUserText(rawText) {
            var MAIN_ORDERED = /^   (\d+)\. (.*)/;
            var MAIN_BULLET  = /^   (?:• |- )(.*)/;
            var SUB_ORDERED  = /^      ([a-z])\. (.*)/;
            var SUB_BULLET   = /^      ◦ (.*)/;
            /* Legacy patterns (no leading spaces) */
            var MAIN_ORDERED_OLD = /^(\d+)\. (.*)/;
            var MAIN_BULLET_OLD  = /^(?:• |- )(.*)/;
            var SUB_ORDERED_OLD  = /^   ([a-z])\. (.*)/;
            var SUB_BULLET_OLD   = /^   ◦ (.*)/;

            var lines       = rawText.split('\n');
            var html        = '';
            var ctx         = null; /* { tag:'ol'|'ul', sub:boolean } */
            var pendingPara = [];

            function flushPara() {
                if (!pendingPara.length) return;
                html += '<p>' + pendingPara.map(escapeHtml).join('<br>') + '</p>';
                pendingPara = [];
            }

            function closeList() {
                if (!ctx) return;
                html += '</' + ctx.tag + '>';
                ctx = null;
            }

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                /* New indented format first, fall back to legacy */
                var mo = MAIN_ORDERED.exec(line) || MAIN_ORDERED_OLD.exec(line);
                var mb = MAIN_BULLET.exec(line)  || MAIN_BULLET_OLD.exec(line);
                var so = SUB_ORDERED.exec(line)  || SUB_ORDERED_OLD.exec(line);
                var sb = SUB_BULLET.exec(line)   || SUB_BULLET_OLD.exec(line);

                if (so) {
                    flushPara();
                    if (!ctx || ctx.tag !== 'ol' || !ctx.sub) {
                        closeList();
                        html += '<ol type="a">';
                        ctx = { tag: 'ol', sub: true };
                    }
                    html += '<li>' + escapeHtml(so[2]) + '</li>';

                } else if (sb) {
                    flushPara();
                    if (!ctx || ctx.tag !== 'ul' || !ctx.sub) {
                        closeList();
                        html += '<ul class="user-sub-ul">';
                        ctx = { tag: 'ul', sub: true };
                    }
                    html += '<li>' + escapeHtml(sb[1]) + '</li>';

                } else if (mo) {
                    flushPara();
                    if (ctx && (ctx.sub || ctx.tag !== 'ol')) closeList();
                    if (!ctx) {
                        var n = parseInt(mo[1], 10);
                        html += n > 1 ? '<ol start="' + n + '">' : '<ol>';
                        ctx = { tag: 'ol', sub: false };
                    }
                    html += '<li>' + escapeHtml(mo[2]) + '</li>';

                } else if (mb) {
                    flushPara();
                    if (ctx && (ctx.sub || ctx.tag !== 'ul')) closeList();
                    if (!ctx) { html += '<ul>'; ctx = { tag: 'ul', sub: false }; }
                    html += '<li>' + escapeHtml(mb[1]) + '</li>';

                } else if (line.trim() === '') {
                    closeList();
                    flushPara();

                } else {
                    closeList();
                    pendingPara.push(line);
                }
            }

            closeList();
            flushPara();
            return html || escapeHtml(rawText);
        }

        /* ── Text helpers ── */
        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatInline(text) {
            return escapeHtml(text)
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }

        function formatFeedbackText(raw) {
            var lines = raw.split('\n');
            var html = '';
            var inList = false;

            function closeList() { if (inList) { html += '</ul>'; inList = false; } }

            for (var i = 0; i < lines.length; i++) {
                var t = lines[i].trim();
                if (!t) { closeList(); continue; }

                if (/^[A-Za-z][A-Za-z\s]+:$/.test(t) && t.indexOf('[') === -1) {
                    closeList();
                    html += '<div class="coach-section-head">' + formatInline(t.slice(0, -1)) + '</div>';
                    continue;
                }
                if (t.charAt(0) === '\u2022' || t.startsWith('- ')) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    var content = t.charAt(0) === '\u2022' ? t.slice(1).trim() : t.slice(2).trim();
                    html += '<li>' + formatInline(content) + '</li>';
                    continue;
                }
                closeList();
                html += '<p>' + formatInline(t) + '</p>';
            }
            closeList();
            return html;
        }


        function parseBullets(text) {
            var lines = text.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
            var bullets = lines.filter(function (l) { return l.charAt(0) === '\u2022' || l.startsWith('- '); });
            if (bullets.length) {
                return bullets.map(function (l) {
                    var content = l.charAt(0) === '\u2022' ? l.slice(1).trim() : l.slice(2).trim();
                    return '<li>' + formatInline(content) + '</li>';
                }).join('');
            }
            return lines.map(function (l) { return '<li>' + formatInline(l) + '</li>'; }).join('');
        }
    </script>
</body>
